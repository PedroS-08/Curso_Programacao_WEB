<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de cadastro</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <div class="cima">
            <h2>Portal do Aluno</h2>
            <input class="busca" type="text" id="buscar" placeholder="Pesquisar...">
        </div>
    </header>

    <aside class="aba_lateral">
        <div class="menu_inicio">
            <div class="icone">home</div>
            <h4 class="nome_menu">Início</h4>
        </div>

        <div class="menu">
            <div class="icone">add_box</div>
            <h4 class="nome_menu">Cadastrar produtos</h4>
        </div>

        <div class="menu">
            <div class="icone">folder</div>
            <h4 class="nome_menu">Meus Produtos</h4>
        </div>

        <div class="menu">
            <div class="icone">sell</div>
            <h4 class="nome_menu">Preços</h4>
        </div>

        <div class="menu">
            <div class="icone">settings</div>
            <h4 class="nome_menu">Configurações</h4>
        </div>
    </aside>
    
    <h1 class="cadastro">Cadastro de Novo Produto - Passo a Passo</h1>
    <h3 class="subtitulo">Olá Aluno! Preencha as informações abaixo para adicionar um produto.</h3>
    <div class="principal">
    </div>
    
    <footer>© 2026 Curso de Desenvolvimento WEB</footer>
</body>
</html>
